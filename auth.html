<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Design workspace — Sign in</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Plus+Jakarta+Sans:wght@600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: Inter, -apple-system, sans-serif;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: oklch(98% 0.003 250);
      color: oklch(16% 0.02 250);
      padding: 24px;
    }
    .card {
      width: 100%;
      max-width: 380px;
      background: #fff;
      border: 1px solid oklch(91% 0.008 250);
      border-radius: 16px;
      padding: 32px 28px;
      box-shadow: 0 4px 12px oklch(0% 0 0 / 0.06);
    }
    .mark {
      width: 36px; height: 36px; border-radius: 10px;
      background: linear-gradient(135deg, #2563eb, #1d4ed8);
      display: grid; place-items: center; color: #fff;
      font-family: "Plus Jakarta Sans", sans-serif;
      font-weight: 700; font-size: 14px;
      margin-bottom: 20px;
    }
    h1 {
      font-family: "Plus Jakarta Sans", sans-serif;
      font-size: 22px; font-weight: 700;
      letter-spacing: -0.02em; margin-bottom: 6px;
    }
    p { font-size: 14px; color: oklch(45% 0.015 250); margin-bottom: 24px; line-height: 1.5; }
    label { display: block; font-size: 13px; font-weight: 500; margin-bottom: 6px; }
    input {
      width: 100%; height: 42px; padding: 0 12px;
      border: 1px solid oklch(91% 0.008 250);
      border-radius: 8px; font: inherit; font-size: 14px;
    }
    input:focus {
      outline: none;
      border-color: #2563eb;
      box-shadow: 0 0 0 3px oklch(95% 0.03 250);
    }
    button {
      width: 100%; height: 42px; margin-top: 16px;
      border: none; border-radius: 8px;
      background: #2563eb; color: #fff;
      font: inherit; font-size: 14px; font-weight: 600;
      cursor: pointer;
    }
    button:hover { background: #1d4ed8; }
    button:disabled { opacity: 0.6; cursor: not-allowed; }
    .err {
      display: none; margin-top: 12px;
      font-size: 13px; color: #dc2626;
    }
    .err.show { display: block; }
  </style>
</head>
<body>
  <div class="card">
    <div class="mark">TW</div>
    <h1>Design workspace</h1>
    <p>Enter the team password to view prototypes and the version log.</p>
    <form id="gate">
      <label for="password">Password</label>
      <input id="password" type="password" name="password" autocomplete="current-password" autofocus required>
      <button type="submit" id="submit">Continue</button>
      <p class="err" id="err">Wrong password. Try again.</p>
    </form>
  </div>
  <script>
    const params = new URLSearchParams(location.search);
    const next = params.get("next") || "/";

    document.getElementById("gate").addEventListener("submit", async (e) => {
      e.preventDefault();
      const btn = document.getElementById("submit");
      const err = document.getElementById("err");
      err.classList.remove("show");
      btn.disabled = true;
      btn.textContent = "Checking…";

      try {
        const res = await fetch("/api/dvl-auth", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ password: document.getElementById("password").value }),
        });
        if (res.ok) {
          location.replace(next.startsWith("/") ? next : "/");
          return;
        }
        err.classList.add("show");
      } catch {
        err.textContent = "Something went wrong. Try again.";
        err.classList.add("show");
      } finally {
        btn.disabled = false;
        btn.textContent = "Continue";
      }
    });
  </script>
</body>
</html>
